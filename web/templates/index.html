<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DL24 Electronic Load</title>
<script src="https://cdn.plot.ly/plotly-3.0.1.min.js"></script>
<style>
  :root {
    --bg: #0f0f1a;
    --card: #1a1a30;
    --border: #2a2a45;
    --text: #e0e0f0;
    --dim: #8888aa;
    --accent: #00d4aa;
    --warn: #ffaa00;
    --danger: #ff4466;
    --blue: #4488ff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px;
    background: var(--card);
    border-bottom: 1px solid var(--border);
  }
  header h1 { font-size: 1.3rem; font-weight: 600; letter-spacing: 0.02em; }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; }
  .status-dot.on { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .status-dot.off { background: var(--danger); box-shadow: 0 0 8px var(--danger); }
  .status { font-size: 0.85rem; color: var(--dim); }

  .metrics {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
    padding: 20px 24px;
  }
  .metric-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
  }
  .metric-card .label {
    font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--dim); margin-bottom: 6px;
  }
  .metric-card .value {
    font-size: 2rem; font-weight: 700; letter-spacing: -0.02em;
  }
  .metric-card .unit { font-size: 0.9rem; font-weight: 400; color: var(--dim); margin-left: 4px; }
  .metric-card .sub { font-size: 0.8rem; color: var(--dim); margin-top: 4px; }

  .graph-section {
    margin: 0 24px 20px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  #graph { width: 100%; height: 400px; }

  .controls {
    display: flex; gap: 10px; padding: 20px 24px; flex-wrap: wrap;
  }
  .btn {
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); padding: 8px 18px; border-radius: 6px;
    cursor: pointer; font-size: 0.85rem; transition: all 0.15s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.danger:hover { border-color: var(--danger); color: var(--danger); }

  .error-banner {
    margin: 0 24px; padding: 12px 16px; background: #331111;
    border: 1px solid var(--danger); border-radius: 6px;
    color: var(--danger); font-size: 0.85rem; display: none;
  }

  .secondary-stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    padding: 0 24px 20px;
  }
  .sec-stat {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 14px; text-align: center;
  }
  .sec-stat .val { font-size: 1.1rem; font-weight: 600; }
  .sec-stat .lbl { font-size: 0.7rem; color: var(--dim); text-transform: uppercase; }

  @media (max-width: 600px) {
    .metrics { grid-template-columns: 1fr 1fr; }
    .secondary-stats { grid-template-columns: 1fr 1fr; }
    .metric-card .value { font-size: 1.5rem; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>DL24 Electronic Load</h1>
    <span class="status">
      <span class="status-dot off" id="status-dot"></span>
      <span id="status-text">Disconnected</span>
    </span>
  </div>
  <div style="font-size:0.8rem;color:var(--dim)" id="device-addr"></div>
</header>

<div class="error-banner" id="error-banner"></div>

<div class="metrics">
  <div class="metric-card">
    <div class="label">Voltage</div>
    <div class="value" style="color:var(--blue)" id="val-voltage">--</div>
    <div class="unit">V</div>
  </div>
  <div class="metric-card">
    <div class="label">Current</div>
    <div class="value" style="color:var(--accent)" id="val-current">--</div>
    <div class="unit">A</div>
  </div>
  <div class="metric-card">
    <div class="label">Power</div>
    <div class="value" id="val-power">--</div>
    <div class="unit">W</div>
  </div>
  <div class="metric-card">
    <div class="label">Temperature</div>
    <div class="value" id="val-temp">--</div>
    <div class="unit">°C</div>
    <div class="sub" id="val-resistance">R: -- Ω</div>
  </div>
</div>

<div class="secondary-stats">
  <div class="sec-stat"><div class="val" id="val-ah">--</div><div class="lbl">Capacity (Ah)</div></div>
  <div class="sec-stat"><div class="val" id="val-wh">--</div><div class="lbl">Energy (Wh)</div></div>
  <div class="sec-stat"><div class="val" id="val-runtime">--</div><div class="lbl">Runtime</div></div>
  <div class="sec-stat"><div class="val" id="val-samples">0</div><div class="lbl">Samples</div></div>
</div>

<div class="graph-section"><div id="graph"></div></div>

<div class="controls">
  <button class="btn danger" onclick="sendCommand('reset_all')">Reset All</button>
  <button class="btn" onclick="sendCommand('reset_ah')">Reset Ah</button>
  <button class="btn" onclick="sendCommand('reset_wh')">Reset Wh</button>
  <button class="btn" onclick="sendCommand('reset_time')">Reset Time</button>
</div>

<script>
const MAX_POINTS = 300;
let timestamps = [];
let voltages = [];
let currents = [];
let sampleCount = 0;
let ws = null;
let reconnectDelay = 1000;

function setConnected(ok, addr) {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  dot.className = 'status-dot ' + (ok ? 'on' : 'off');
  txt.textContent = ok ? 'Connected' : 'Disconnected';
  document.getElementById('device-addr').textContent = addr || '';
  document.getElementById('error-banner').style.display = 'none';
}

function showError(msg) {
  const el = document.getElementById('error-banner');
  el.textContent = msg;
  el.style.display = 'block';
}

function updateMetrics(data) {
  document.getElementById('val-voltage').textContent = data.voltage?.toFixed(2) ?? '--';
  document.getElementById('val-current').textContent = data.current?.toFixed(3) ?? '--';
  document.getElementById('val-power').textContent = data.power?.toFixed(1) ?? '--';
  document.getElementById('val-temp').textContent = data.temperature ?? '--';
  document.getElementById('val-resistance').textContent = 'R: ' + (data.resistance?.toFixed(1) ?? '--') + ' Ω';
  document.getElementById('val-ah').textContent = data.capacity_ah?.toFixed(3) ?? '--';
  document.getElementById('val-wh').textContent = data.energy_wh?.toFixed(1) ?? '--';
  document.getElementById('val-runtime').textContent = data.runtime ?? '--';
  document.getElementById('val-samples').textContent = sampleCount;
}

function initGraph() {
  Plotly.newPlot('graph', [
    {
      y: [], x: [], name: 'Voltage (V)', type: 'scatter', mode: 'lines',
      line: { color: '#4488ff', width: 1.5 }, yaxis: 'y',
    },
    {
      y: [], x: [], name: 'Current (A)', type: 'scatter', mode: 'lines',
      line: { color: '#00d4aa', width: 1.5 }, yaxis: 'y2',
    },
  ], {
    paper_bgcolor: 'rgba(0,0,0,0)',
    plot_bgcolor: 'rgba(0,0,0,0)',
    font: { color: '#8888aa', size: 11 },
    margin: { t: 10, r: 60, b: 40, l: 50 },
    xaxis: { title: 'Time', gridcolor: '#1a1a30', zeroline: false },
    yaxis: { title: 'Voltage (V)', gridcolor: '#1a1a30', zerolinecolor: '#2a2a45' },
    yaxis2: { title: 'Current (A)', overlaying: 'y', side: 'right', gridcolor: 'rgba(0,0,0,0)' },
    legend: { orientation: 'h', y: 1.1 },
  }, { responsive: true, displayModeBar: false });
}

function updateGraph(data) {
  const now = new Date();
  timestamps.push(now);
  voltages.push(data.voltage || 0);
  currents.push(data.current || 0);

  if (timestamps.length > MAX_POINTS) {
    timestamps = timestamps.slice(-MAX_POINTS);
    voltages = voltages.slice(-MAX_POINTS);
    currents = currents.slice(-MAX_POINTS);
  }

  Plotly.update('graph', {
    x: [timestamps, timestamps],
    y: [voltages, currents],
  }, {}, [0, 1]);
}

function sendCommand(cmd) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ command: cmd }));
  }
}

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const url = `${proto}//${location.host}/ws`;
  ws = new WebSocket(url);

  ws.onopen = () => {
    reconnectDelay = 1000;
  };

  ws.onmessage = (event) => {
    try {
      const data = JSON.parse(event.data);
      if (data.type === 'status') {
        setConnected(data.connected, data.address || '');
      } else if (data.type === 'error') {
        showError(data.message);
      } else if (data.type === 'ping' || data.type === 'command_ack') {
        // ignore
      } else {
        sampleCount++;
        updateMetrics(data);
        updateGraph(data);
      }
    } catch(e) {}
  };

  ws.onclose = () => {
    setConnected(false);
    setTimeout(connect, reconnectDelay);
    reconnectDelay = Math.min(reconnectDelay * 1.5, 15000);
  };

  ws.onerror = () => {
    ws.close();
  };
}

initGraph();
connect();
</script>
</body>
</html>
